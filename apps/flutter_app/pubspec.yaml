name: karamania
description: "Karamania - The ultimate karaoke party app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^14.8.1
  socket_io_client: ^3.0.2
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  qr_flutter: ^4.1.0
  http: ^1.6.0
  share_plus: ^12.0.1
  wakelock_plus: ^1.2.8
  flutter_soloud: ^3.4.6
  torch_light: ^1.1.0
  dart_open_fetch_runtime:
    git:
      url: https://github.com/andukdahacker/dart-open-fetch.git
      path: packages/dart_open_fetch_runtime

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/sounds/

  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Variable.ttf
